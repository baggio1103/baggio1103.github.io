# Site settings
title: Baggio Developer
description: 'Data structures, Algorithms, Java, Motivation and many more...!'
url: 'http://joshgerdes.com/jekyll-uno'
baseurl: '/jekyll-uno'
# google_analytics: 'UA-XXXXXX-X'
# disqus_shortname: 'valijanovbakhrom'

author:
  name: 'Valijanov Bahromjon'
  email: Valijanov1103@mail.ru
  twitter_username: ""
  facebook_username: Bakhromjon.valijanov
  github_username:  baggio1103
  linkedin_username:  ""

defaults:
  -
    scope:
      path: ''
      type: 'posts'
    values:
        layout: 'post'

# Build settings
destination: _site
paginate: 10
permalink: /:year/:title/
markdown: kramdown
highlighter: rouge

sass:
    sass_dir: _sass
    style: compressed

kramdown:
  # use Github Flavored Markdown
  input: GFM
  # do not replace newlines by <br>s
  hard_wrap: false

plugins: ['jekyll-paginate']
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'screenshot.png']
